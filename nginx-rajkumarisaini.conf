# /etc/nginx/sites-available/rajkumarisaini.com
# Static site: index.html + images/
# Deploy the repo to /var/www/rajkumarisaini.com (see notes at bottom).

# ---- HTTP: redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name rajkumarisaini.com www.rajkumarisaini.com;

    # Let certbot answer ACME challenges over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://rajkumarisaini.com$request_uri;
    }
}

# ---- HTTPS: redirect www -> apex ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.rajkumarisaini.com;

    ssl_certificate     /etc/letsencrypt/live/rajkumarisaini.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rajkumarisaini.com/privkey.pem;

    return 301 https://rajkumarisaini.com$request_uri;
}

# ---- HTTPS: serve the site on the apex domain ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rajkumarisaini.com;

    root /var/www/rajkumarisaini.com;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/rajkumarisaini.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rajkumarisaini.com/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
